<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindusXStretch Light</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
</head>
<body>

  <header>
    <img src="icon.png" alt="FindusXStretch Logo" class="app-logo">
    <h1>FindusXStretch</h1>
    <p>Mobile Ambient Engine</p>
  </header>

  <div class="glass-panel">
    
    <div id="waveformContainer" style="display: none; width: 100%; min-height: 80px; margin-bottom: 15px; border: 2px solid var(--glass-border); border-radius: var(--btn-radius); padding: 10px; background: rgba(0,0,0,0.2);">
      <div id="waveform" style="width: 100%; min-height: 80px;"></div>
    </div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('audioInput').click()">
      <div id="uploadPrompt">
        <p style="font-weight:600; font-size:1.1rem; color:var(--text-main);" id="uploadPromptText">Tap to Upload Audio</p>
        <p style="font-size:0.8rem; margin-top:5px; color:var(--text-muted);" id="fileName">Select a short WAV file</p>
      </div>
      <input type="file" id="audioInput" accept="audio/wav, audio/x-wav" style="display: none;">
    </div>

    <!-- Main Settings -->
    <div class="control-group">
      <label>Presets:</label>
      <select id="presetSelect">
        <option value="default">Default</option>
        <option value="deep_ambient">Deep Ambient</option>
        <option value="glitchy_tape">Glitchy Tape</option>
        <option value="shimmering_ice">Shimmering Ice</option>
      </select>
    </div>

    <div class="control-group">
      <label>Stretch Factor: <span class="val" id="stretchVal">4x</span></label>
      <input type="range" id="stretchSlider" min="2" max="16" step="1" value="4">
    </div>

    <div class="control-group">
      <label>Reverb: <span class="val" id="reverbVal">0.5</span></label>
      <input type="range" id="reverbSlider" min="0" max="1" step="0.1" value="0.5">
    </div>
    
    <div class="control-group">
      <label>Shimmer: <span class="val" id="shimmerVal">0.3</span></label>
      <input type="range" id="shimmerSlider" min="0" max="1" step="0.1" value="0.3">
    </div>

    <!-- Advanced Settings Toggle -->
    <button id="advancedToggle" class="btn-text">⚙️ Advanced Settings</button>
    
    <div id="advancedPanel" class="advanced-panel" style="display: none;">
      
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="tab-tone" title="Tone (Quality, Filter, Drive, Bloom)">🎚️</button>
        <button class="tab-btn" data-tab="tab-grain" title="Grain (Texture, Granular, Motion)">✨</button>
        <button class="tab-btn" data-tab="tab-space" title="Space (Delay, Chorus, Width, Autopan)">🌌</button>
        <button class="tab-btn" data-tab="tab-time" title="Time & Mod (Pitch Drift, Reverse, Freeze)">⏳</button>
      </div>

      <div class="tab-content" id="tab-tone">
        <div class="control-group">
          <label>Render Quality:</label>
          <select id="qualitySelect">
            <option value="4096">Fast Preview (Low Quality)</option>
            <option value="8192" selected>Standard (Balanced)</option>
            <option value="16384">High Quality (Slow)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Lowpass Cutoff: <span class="val" id="lowpassVal">6000 Hz</span></label>
          <input type="range" id="lowpassSlider" min="500" max="12000" step="100" value="6000">
        </div>
        <div class="control-group">
          <label>Drive: <span class="val" id="driveVal">0.0</span></label>
          <input type="range" id="driveSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
        <div class="control-group">
          <label>Bloom: <span class="val" id="bloomVal">0.0</span></label>
          <input type="range" id="bloomSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
      </div>

      <div class="tab-content" id="tab-grain" style="display: none;">
        <div class="control-group">
          <label>Texture: <span class="val" id="textureVal">0.0</span></label>
          <input type="range" id="textureSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
        <div class="control-group">
          <label>Granular: <span class="val" id="granularVal">0.0</span></label>
          <input type="range" id="granularSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
        <div class="control-group">
          <label>Motion: <span class="val" id="motionVal">0.0</span></label>
          <input type="range" id="motionSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
      </div>

      <div class="tab-content" id="tab-space" style="display: none;">
        <div class="control-group">
          <label>Delay: <span class="val" id="delayVal">0.0</span></label>
          <input type="range" id="delaySlider" min="0" max="1" step="0.1" value="0.0">
        </div>
        <div class="control-group">
          <label>Chorus: <span class="val" id="chorusVal">0.0</span></label>
          <input type="range" id="chorusSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
        <div class="control-group">
          <label>Stereo Width: <span class="val" id="stereo_widthVal">1.0</span></label>
          <input type="range" id="stereo_widthSlider" min="0" max="2" step="0.1" value="1.0">
        </div>
        <div class="control-group">
          <label>Autopan: <span class="val" id="autopanVal">0.0</span></label>
          <input type="range" id="autopanSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
      </div>

      <div class="tab-content" id="tab-time" style="display: none;">
        <div class="control-group">
          <label>Pitch Drift: <span class="val" id="pitch_driftVal">0.0</span></label>
          <input type="range" id="pitch_driftSlider" min="0" max="1" step="0.1" value="0.0">
        </div>
        <div class="control-group toggle-group">
          <label>Reverse</label>
          <label class="switch">
            <input type="checkbox" id="reverseToggle">
            <span class="switch-slider round"></span>
          </label>
        </div>
        <div class="control-group toggle-group">
          <label>Freeze</label>
          <label class="switch">
            <input type="checkbox" id="freezeToggle">
            <span class="switch-slider round"></span>
          </label>
        </div>
      </div>
    </div>

    <button id="surpriseBtn" class="btn-text" style="font-size: 1.1rem; margin-bottom: 10px;">🎲 Surprise Me</button>

    <button class="btn" id="processBtn" disabled>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
      Stretch Audio
    </button>
    
    <div class="status pulse" id="statusText">Initializing Engine...</div>
    <div id="progressContainer" style="display: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 10px; overflow: hidden;">
      <div id="progressBar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.2s;"></div>
    </div>
    <div id="playerContainer" style="display:none; margin-top: 20px;">
        <audio id="player" controls style="width: 100%;"></audio>
        <button class="btn btn-secondary" id="downloadBtn" style="margin-top: 10px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
          Share / Save
        </button>
    </div>

  </div>

  <div style="margin-top: 20px; width: 100%; max-width: 450px;">
    <label style="display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); font-weight: 600;">App Theme:</label>
    <select id="themeSelect">
      <option value="default">Default (Glass Purple)</option>
      <option value="studio">Studio</option>
      <option value="8bit">8-bit</option>
      <option value="c64">C64</option>
      <option value="amiga">Amiga</option>
      <option value="matrix">Matrix</option>
    </select>
  </div>

  <script src="app.js"></script>
</body>
</html>
